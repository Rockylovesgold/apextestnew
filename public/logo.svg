<svg width="240" height="262" viewBox="0 0 240 262" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AIOV Capital">
  <defs>
    <linearGradient id="gFull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E50B3"/>
      <stop offset="35%" stop-color="#5798FF"/>
      <stop offset="65%" stop-color="#3680FF"/>
      <stop offset="100%" stop-color="#1E50B3"/>
    </linearGradient>
    <linearGradient id="gText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AB3FF"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#7AB3FF"/>
    </linearGradient>
    <linearGradient id="gShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1838"/>
      <stop offset="100%" stop-color="#070C1C"/>
    </linearGradient>
    <filter id="fShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.65)"/>
    </filter>
  </defs>

  <!-- Orbit ring back (behind shield) -->
  <ellipse cx="120" cy="100" rx="106" ry="31"
    fill="none" stroke="url(#gFull)" stroke-width="3.5"
    transform="rotate(-18, 120, 100)"
    opacity="0.38"/>

  <!-- Shield drop shadow -->
  <path d="M120,16 L192,45 L192,106 Q192,160 120,184 Q48,160 48,106 L48,45 Z"
    fill="rgba(0,0,0,0.5)" filter="url(#fShadow)" transform="translate(3,6)"/>

  <!-- Shield body -->
  <path d="M120,16 L192,45 L192,106 Q192,160 120,184 Q48,160 48,106 L48,45 Z"
    fill="url(#gShield)"/>

  <!-- Shield outer border -->
  <path d="M120,16 L192,45 L192,106 Q192,160 120,184 Q48,160 48,106 L48,45 Z"
    fill="none" stroke="url(#gFull)" stroke-width="2.8" opacity="0.95"/>

  <!-- Shield inner rim highlight -->
  <path d="M120,25 L183,51 L183,106 Q183,154 120,175 Q57,154 57,106 L57,51 Z"
    fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bar chart bars (5 bars, rising left to right) -->
  <rect x="68"  y="118" width="12" height="28" rx="2" fill="url(#gFull)" opacity="0.95"/>
  <rect x="84"  y="107" width="12" height="39" rx="2" fill="url(#gFull)" opacity="0.95"/>
  <rect x="100" y="95"  width="12" height="51" rx="2" fill="url(#gFull)" opacity="0.95"/>
  <rect x="116" y="82"  width="12" height="64" rx="2" fill="url(#gFull)" opacity="0.95"/>
  <rect x="132" y="68"  width="12" height="78" rx="2" fill="url(#gFull)" opacity="0.95"/>

  <!-- Trend line -->
  <line x1="66" y1="124" x2="152" y2="56"
    stroke="url(#gFull)" stroke-width="2.8" stroke-linecap="round" opacity="0.88"/>

  <!-- Arrow head -->
  <path d="M152,56 L140,62 L145,73 Z" fill="url(#gFull)" opacity="0.88"/>

  <!-- Orbit ring front arc (over shield) -->
  <ellipse cx="120" cy="100" rx="106" ry="31"
    fill="none" stroke="url(#gFull)" stroke-width="3.5"
    transform="rotate(-18, 120, 100)"
    stroke-dasharray="210 248" stroke-dashoffset="-24"
    opacity="0.97"/>

  <!-- "AIOV" text -->
  <text x="120" y="215"
    text-anchor="middle"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="32" font-weight="600"
    letter-spacing="6"
    fill="url(#gText)">AIOV</text>

  <!-- Decorative lines flanking CAPITAL -->
  <line x1="36" y1="231" x2="72" y2="231" stroke="url(#gText)" stroke-width="1.5" opacity="0.6"/>
  <text x="120" y="236"
    text-anchor="middle"
    font-family="Inter, Arial, Helvetica, sans-serif"
    font-size="11.5" font-weight="700"
    letter-spacing="5"
    fill="url(#gText)" opacity="0.88">CAPITAL</text>
  <line x1="168" y1="231" x2="204" y2="231" stroke="url(#gText)" stroke-width="1.5" opacity="0.6"/>
</svg>
